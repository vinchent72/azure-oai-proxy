services:
  azure-oai-proxy:
    # env_file: .env
    image: 'vinchent72/azure-oai-proxy:latest'
    # container_name: azure-oai-proxy
    # Alternatively, use GitHub Container Registry:
    # image: 'ghcr.io/gyarbij/azure-oai-proxy:latest'
    restart: always
    environment:
      - FOUNDRY_API_KEY=your-foundry-api-key-here
      - AUTH_TOKENS=sk-dev-coding-token-432323,sk-dev-another-token
      - AZURE_FOUNDRY_REGION=westus
      - ANTHROPIC_APIVERSION=2023-06-01
    # Optional: Add custom model mappings
    # - AZURE_OPENAI_MODEL_MAPPER=custom-model-1=foundry-deployment-1,custom-model-2=foundry-deployment-2
    # Optional: Override the default address and mode
    # - AZURE_OPENAI_PROXY_ADDRESS=0.0.0.0:11437
    # - AZURE_OPENAI_PROXY_MODE=foundry
    ports:
      - '11437:11437'
    # Uncomment the following line to use an .env file:
    # env_file:
    #   - .env
